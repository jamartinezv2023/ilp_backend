apiVersion: apps/v1
kind: Deployment
metadata:
  name: adaptive-education-service
  labels:
    app: adaptive-education-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adaptive-education-service
  template:
    metadata:
      labels:
        app: adaptive-education-service
    spec:
      containers:
        - name: adaptive-education-service
          image: ilp_backend-adaptive-education-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/adaptive_education_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ilp"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ilp"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: adaptive-education-service
spec:
  selector:
    app: adaptive-education-service
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
  type: ClusterIP
