name: SonarCloud Analysis

on:
  push:
    branches: [ main, feat/mvp-001-educational-diagnosis ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar `
          -Dsonar.projectKey=jamartinezv2023_backend_ILP- `
          -Dsonar.organization=jamartinezv2023 `
          -Dsonar.host.url=https://sonarcloud.io `
          --no-daemon
