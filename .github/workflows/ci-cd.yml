name: ILP Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 🔒 PASO CRÍTICO: asegurar permisos del wrapper
      - name: Ensure Gradle Wrapper is executable
        run: |
          chmod +x ./gradlew
          chmod -R +x gradle/wrapper

      # ✅ Build del Golden Module
      - name: Build auth-service (Golden Module)
        run: ./gradlew :auth-service:clean :auth-service:test

      # (Opcional / futuro)
      - name: Build Docker image for adaptive-education-service
        if: success()
        run: |
          cd adaptive-education-service
          docker build -t ilp/adaptive-education-service:latest .

