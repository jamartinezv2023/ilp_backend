name: ILP Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 👇 ESTA ES LA CLAVE
      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build auth-service (Golden Module)
        run: ./gradlew :auth-service:clean :auth-service:test
