name: ILP Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3️⃣ Verificación defensiva del wrapper
      - name: Verify Gradle Wrapper files
        run: |
          echo "📁 Listing root files"
          ls -la
          echo "📁 Listing gradle/wrapper"
          ls -la gradle/wrapper
          test -f gradlew || (echo "❌ gradlew not found" && exit 1)
          test -f gradle/wrapper/gradle-wrapper.jar || (echo "❌ gradle-wrapper.jar missing" && exit 1)

      # 4️⃣ Permisos (SOLO gradlew)
      - name: Make Gradle Wrapper executable
        run: |
          chmod +x gradlew
          ls -la gradlew

      # 5️⃣ Build Golden Module
      - name: Build auth-service (Golden Module)
        run: |
          ./gradlew --version
          ./gradlew :auth-service:clean :auth-service:test

      # 6️⃣ (Opcional – futuro)
      - name: Build Docker image for adaptive-education-service
        if: success()
        run: |
          cd adaptive-education-service
          docker build -t ilp/adaptive-education-service:latest .


