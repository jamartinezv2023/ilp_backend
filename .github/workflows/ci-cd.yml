name: ILP Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build auth-service with Gradle
        run: ./gradlew :auth-service:clean :auth-service:test


      - name: Build Docker image for adaptive-education-service
        if: success()
        run: |
          cd adaptive-education-service
          docker build -t ilp/adaptive-education-service:latest .
