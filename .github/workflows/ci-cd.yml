name: ILP Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3️⃣ Verificación defensiva del wrapper
      - name: Verify Gradle Wrapper
        run: |
          echo "📁 Root:"
          ls -la
          echo "📁 gradle/wrapper:"
          ls -la gradle/wrapper
          test -f gradlew
          test -f gradle/wrapper/gradle-wrapper.jar

      # 4️⃣ Permisos
      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      # 5️⃣ Golden Module Build (ÚNICA fuente de verdad)
      - name: Build auth-service (Golden Module)
        run: |
          ./gradlew --version
          ./gradlew :auth-service:clean :auth-service:test

      # 🚫 Docker deshabilitado temporalmente
      # Se reactivará cuando adaptive-education-service sea normalizado
