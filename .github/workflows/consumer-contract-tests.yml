name: ILP Backend Consumer Contract Tests

on:
  push:
    branches:
      - main
    paths:
      - "contracts/**"
      - "auth-service/**"
      - "adaptive-education-service/**"
      - ".github/workflows/consumer-contract-tests.yml"

  pull_request:
    branches:
      - main
    paths:
      - "contracts/**"
      - "auth-service/**"
      - "adaptive-education-service/**"
      - ".github/workflows/consumer-contract-tests.yml"

  workflow_dispatch:

jobs:
  auth-service-consumer-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Validate auth-service consumer contracts
        run: |
          ./gradlew :auth-service:test \
          :auth-service:jacocoTestReport \
          :auth-service:checkstyleTest \
          --no-daemon

      - name: Validate adaptive-service consumer contracts
        run: |
          ./gradlew :adaptive-education-service:test \
          :adaptive-education-service:jacocoTestReport \
          :adaptive-education-service:checkstyleTest \
          --no-daemon

      - name: Upload auth-service consumer contract reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-consumer-contract-report
          path: |
            auth-service/build/reports/tests/test/**
            auth-service/build/reports/jacoco/test/**
            adaptive-education-service/build/reports/tests/test/**
            adaptive-education-service/build/reports/jacoco/test/**
