name: ILP Backend Quality Gate

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  quality:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build + Test + Coverage
        run: |
          ./gradlew clean \
          build \
          test \
          jacocoTestReport \
          --no-daemon \
          -x :adaptive-education-service:test

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            **/build/reports/jacoco/**
      - name: SonarCloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        continue-on-error: true

        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

        run: |
          echo "Running SonarCloud analysis..."

          ./gradlew sonar \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.organization=jamartinezv2023 \
          -Dsonar.projectKey=jamartinezv2023_ilp_backend \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.coverage.jacoco.xmlReportPaths=auth-service/build/reports/jacoco/test/jacocoTestReport.xml,adaptive-education-service/build/reports/jacoco/test/jacocoTestReport.xml \
          --no-daemon \
          --info

