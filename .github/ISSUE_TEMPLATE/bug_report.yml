name: Enterprise Bug Report
description: Report a platform issue
title: "[BUG] "
labels:
  - bug

body:
  - type: textarea
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual result
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Severity
      options:
        - Sev0
        - Sev1
        - Sev2
        - Sev3
        - Sev4

  - type: textarea
    attributes:
      label: Root Cause Analysis

  - type: textarea
    attributes:
      label: Preventive Actions
