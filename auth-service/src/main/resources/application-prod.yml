server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    org.springframework.security: INFO

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: "inclusive-learning-platform"
    audience: "ilp-api"
    version: 1
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
    clock-skew-seconds: 60
