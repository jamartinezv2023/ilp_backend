server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me}
    issuer: "ilp-auth-service"
    access-token-minutes: 15
    refresh-token-days: 7
